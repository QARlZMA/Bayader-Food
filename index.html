<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بيادر الغذاء</title>

<style>
body{
  margin:0;
  font-family:Cairo;
  background:linear-gradient(-45deg,#f7e8d0,#fff,#ffe7c2,#fff3e6);
  background-size:200% 200%;
  animation:bg 18s ease infinite;
}

@keyframes bg{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* الهيدر */
header{
  background:linear-gradient(135deg,#3e2723,#5d4037);
  color:white;
  text-align:center;
  padding:25px;
  border-bottom-left-radius:20px;
  border-bottom-right-radius:20px;
}

.logo{
  width:85px;
  height:85px;
  border-radius:50%;
  background:white;
  padding:5px;
  object-fit:cover;
  animation:logo 3s ease-in-out infinite;
}

@keyframes logo{
  0%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
  100%{transform:translateY(0)}
}

/* الفلاتر */
.filter{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  padding:10px;
}

.filter button{
  flex:1;
  padding:8px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#d9792b,#ff9f43);
  color:white;
  cursor:pointer;
}

/* المنتجات */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:10px;
  padding:10px;
}

.card{
  background:white;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
  display:flex;
  flex-direction:column;
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
  cursor:pointer;
}

.card-body{
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:5px;
}

/* الأزرار */
button{
  padding:6px;
  border:none;
  border-radius:8px;
  background:#d9792b;
  color:white;
  cursor:pointer;
  font-size:12px;
}

.card button{
  background:linear-gradient(135deg,#1f8a70,#2dbd9c);
}

/* السلة */
.cart{
  position:fixed;
  bottom:15px;
  left:15px;
  background:#3e2723;
  color:white;
  padding:10px 15px;
  border-radius:25px;
  cursor:pointer;
  z-index:999;
}

/* الأدمن */
#loginBtn{
  position:fixed;
  top:10px;
  left:10px;
  width:40px;
  height:40px;
  border-radius:50%;
  background:#000;
  color:#fff;
  border:none;
  z-index:9999;
  cursor:pointer;
}

#addBtn{
  display:none;
  position:fixed;
  bottom:80px;
  left:20px;
  width:55px;
  height:55px;
  border-radius:50%;
  font-size:22px;
  background:#1f8a70;
  color:white;
  border:none;
  z-index:9999;
}

/* المودالات */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:#000000cc;
  justify-content:center;
  align-items:center;
  z-index:99999;
}

.box{
  background:white;
  padding:15px;
  width:90%;
  max-width:420px;
  border-radius:16px;
  position:relative;
}

.closeX{
  position:absolute;
  top:8px;
  left:10px;
  font-size:22px;
  cursor:pointer;
}

/* السلة */
.cartItem{
  padding:8px;
  border-bottom:1px solid #eee;
}

/* تكبير الصورة */
#imgModal{
  display:none;
  justify-content:center;
  align-items:center;
}

#bigImg{
  max-width:90%;
  max-height:90%;
  object-fit:contain;
  border-radius:12px;
}
</style>
</head>

<body>

<button id="loginBtn" onclick="openLogin()">🔐</button>

<header>
  <a href="https://maps.app.goo.gl/cXQ9gA8hxuBaSKNH7" target="_blank">
    <img src="logo.png" class="logo">
  </a>
  <h2>شركة بيادر الغذاء قسم الحلويات</h2>
  <p>شوكولاتة • بسكويت • بطاطس</p>
  <a href="https://maps.app.goo.gl/cXQ9gA8hxuBaSKNH7" target="_blank">
    <button>📍 موقعنا</button>
  </a>
</header>

<div class="filter">
  <button onclick="filter('all')">الكل</button>
  <button onclick="filter('شوكولاتة')">شوكولاتة</button>
  <button onclick="filter('بسكويت')">بسكويت</button>
  <button onclick="filter('بطاطس')">بطاطس</button>
  <button onclick="filter('حلاوة')">حلاوة</button>
  <button onclick="filter('جلي')">جلي</button>
  <button onclick="filter('مصاص')">مصاص</button>
  <button onclick="filter('كيك')">كيك</button>
  <button onclick="filter('لبان')">لبان</button>
</div>

<div class="grid" id="products"></div>

<div class="cart" onclick="openCart()">
  🛒 (<span id="count">0</span>)
</div>

<button id="addBtn" onclick="openAdd()">+</button>

<div class="modal" id="imgModal">
  <img id="bigImg">
</div>

<!-- مودالات -->
<div class="modal" id="loginModal">
  <div class="box">
    <span class="closeX" onclick="loginModal.style.display='none'">✖</span>
    <h3>دخول الأدمن</h3>
    <input id="pass" type="password" style="width:100%;padding:10px">
    <button onclick="login()">دخول</button>
  </div>
</div>

<div class="modal" id="addModal">
  <div class="box">
    <span class="closeX" onclick="addModal.style.display='none'">✖</span>
    <h3>إضافة / تعديل منتج</h3>

    <input id="pName" placeholder="اسم" style="width:100%;padding:8px">
    <select id="pCategory" style="width:100%;padding:8px">
      <option>شوكولاتة</option>
      <option>بسكويت</option>
      <option>بطاطس</option>
      <option>حلاوة</option>
      <option>جلي</option>
      <option>مصاص</option>
      <option>كيك</option>
      <option>لبان</option>
    </select>

    <input type="file" id="pImage">
    <input id="pBox" placeholder="علب" style="width:100%;padding:8px">
    <input id="pCarton" placeholder="كراتين" style="width:100%;padding:8px">

    <button onclick="addProduct()">حفظ</button>
  </div>
</div>

<div class="modal" id="cartModal">
  <div class="box">
    <span class="closeX" onclick="cartModal.style.display='none'">✖</span>
    <h3>السلة</h3>
    <div id="cartList"></div>
    <button onclick="sendWhatsApp()">إرسال واتساب</button>
  </div>
</div>

<div class="modal" id="qtyModal">
  <div class="box">
    <span class="closeX" onclick="qtyModal.style.display='none'">✖</span>

    <img id="qtyImage" style="width:100%;max-height:200px">
    <p id="qtyName"></p>

    <select id="qtyType">
      <option>علبة</option>
      <option>كرتون</option>
    </select>

    <input id="qtyInput" type="number" value="1">
    <button onclick="confirmAdd()">إضافة</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

const app = initializeApp({
  databaseURL:"https://bayader-food-default-rtdb.firebaseio.com"
});

const db = getDatabase(app);

let products = [], cart = [], selectedIndex = null;
let filterType = "all", isAdmin = false;

onValue(ref(db,"products"), s=>{
  products = s.val() || [];
  render();
});

function render(){
  const div = document.getElementById("products");
  div.innerHTML = "";

  const list = filterType === "all"
    ? products
    : products.filter(p => p.category === filterType);

  const fragment = document.createDocumentFragment();

  list.forEach((p,i)=>{
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img loading="lazy" src="${p.image}">
      <div class="card-body">
        <h3>${p.name}</h3>
        <p>علب: ${p.boxStock ?? 0}</p>
        <p>كراتين: ${p.cartonStock ?? 0}</p>
        <button class="addBtn">إضافة</button>
        ${isAdmin ? `
          <button class="editBtn">✏️ تعديل</button>
          <button class="deleteBtn" style="background:red">🗑 حذف</button>
        ` : ""}
      </div>
    `;

    card.querySelector("img").onclick = ()=> openImg(p.image);
    card.querySelector(".addBtn").onclick = ()=> openQty(i);

    if(isAdmin){
      card.querySelector(".editBtn").onclick = ()=> editProduct(i);
      card.querySelector(".deleteBtn").onclick = ()=> deleteProduct(i);
    }

    fragment.appendChild(card);
  });

  div.appendChild(fragment);
}

window.openImg = (src)=>{
  bigImg.src = src;
  imgModal.style.display = "flex";
};

imgModal.onclick = ()=> imgModal.style.display="none";

window.filter = t => { filterType = t; render(); };
window.openLogin = ()=> loginModal.style.display="flex";

window.login = ()=>{
  if(pass.value === "1234"){
    isAdmin = true;
    addBtn.style.display = "block";
    loginModal.style.display = "none";
    render();
  }
};

window.openAdd = ()=>{
  selectedIndex = null;
  addModal.style.display = "flex";
};

window.addProduct = ()=>{
  let file = pImage.files[0];

  let save = (img)=>{
    let data = {
      name:pName.value,
      category:pCategory.value,
      image:img,
      boxStock:+pBox.value,
      cartonStock:+pCarton.value
    };

    if(selectedIndex !== null){
      products[selectedIndex] = data;
    }else{
      products.push(data);
    }

    set(ref(db,"products"),products);
    addModal.style.display="none";
  };

  if(file){
    const img = new Image();
    const reader = new FileReader();

    reader.onload = e=> img.src = e.target.result;

    img.onload = ()=>{
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      const maxWidth = 400;
      const scale = maxWidth / img.width;

      canvas.width = maxWidth;
      canvas.height = img.height * scale;

      ctx.drawImage(img,0,0,canvas.width,canvas.height);

      save(canvas.toDataURL("image/jpeg",0.7));
    };

    reader.readAsDataURL(file);
  }else{
    save("");
  }
};

window.deleteProduct = i=>{
  if(confirm("حذف المنتج؟")){
    products.splice(i,1);
    set(ref(db,"products"),products);
  }
};

window.editProduct = i=>{
  selectedIndex = i;
  pName.value = products[i].name;
  pCategory.value = products[i].category;
  pBox.value = products[i].boxStock;
  pCarton.value = products[i].cartonStock;
  addModal.style.display = "flex";
};

window.openQty = i=>{
  selectedIndex = i;
  qtyName.innerText = products[i].name;
  qtyImage.src = products[i].image;
  qtyModal.style.display = "flex";
};

window.confirmAdd = ()=>{
  cart.push({
    name:products[selectedIndex].name,
    qty:+qtyInput.value
  });

  count.innerText = cart.length;
  qtyModal.style.display = "none";
};

window.openCart = ()=>{
  const div = document.getElementById("cartList");
  div.innerHTML = "";

  const fragment = document.createDocumentFragment();

  cart.forEach(p=>{
    const item = document.createElement("div");
    item.className = "cartItem";
    item.textContent = `${p.name} - ${p.qty}`;
    fragment.appendChild(item);
  });

  div.appendChild(fragment);
  cartModal.style.display="flex";
};

window.sendWhatsApp = ()=>{
  let msg = "طلب:\n";

  cart.forEach(p=>{
    msg += `${p.name} ${p.qty}\n`;
  });

  window.open("https://wa.me/966556602322?text=" + encodeURIComponent(msg));
};
</script>

</body>
</html>
