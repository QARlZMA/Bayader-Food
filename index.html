<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بيادر الغذاء</title>

<style>
body{
margin:0;
font-family:Cairo,sans-serif;
background:#f7e8d0;
}

header{
background:#3e2723;
color:white;
text-align:center;
padding:20px;
position:relative;
}

#loginBtn{
position:absolute;
top:10px;
left:10px;
font-size:12px;
padding:6px 10px;
border:none;
border-radius:8px;
background:#ffffff22;
color:white;
cursor:pointer;
}

.container{
max-width:1000px;
margin:auto;
padding:15px;
}

#dropZone{
display:none;
border:2px dashed #d9792b;
padding:20px;
text-align:center;
border-radius:12px;
margin-bottom:15px;
background:#fff7ef;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:12px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

.card-body{
padding:10px;
text-align:center;
}

button{
width:100%;
padding:8px;
border:none;
border-radius:10px;
background:#d9792b;
color:white;
}

.del{
background:#c0392b;
margin-top:5px;
}

.cart{
position:fixed;
bottom:15px;
left:15px;
background:#3e2723;
color:white;
padding:10px 15px;
border-radius:30px;
}
</style>
</head>

<body>

<header>
<button id="loginBtn" onclick="login()">مدير</button>
<h2>بيادر الغذاء للحلويات</h2>
</header>

<div class="container">

<div id="dropZone">اسحب صورة لإضافة منتج</div>
<input type="file" id="fileInput" hidden>

<div class="grid" id="products"></div>

</div>

<div class="cart">🛒 <span id="count">0</span></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";

const firebaseConfig = {
apiKey: "AIzaSyCBylxNbBu1vqp0vBzFHuIKQTwKnONB2KI",
authDomain: "bayader-food.firebaseapp.com",
databaseURL: "https://bayader-food-default-rtdb.firebaseio.com",
projectId: "bayader-food",
storageBucket: "bayader-food.appspot.com",
messagingSenderId: "977142574677",
appId: "1:977142574677:web:86f37e2c11259a9d886edc"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);

let isAdmin = false;
let cart = [];

const productsRef = ref(db,"products");

/* تحميل المنتجات */
onValue(productsRef,(snap)=>{
render(snap.val() || {});
});

/* دخول مدير */
window.login = function(){
let pass = prompt("كلمة السر");
if(pass==="1234"){
isAdmin=true;
document.getElementById("dropZone").style.display="block";
document.getElementById("loginBtn").style.display="none";
}
}

/* رفع صورة */
function handleFile(file){
let name = prompt("اسم المنتج:");
if(!name) return;

let fileRef = sRef(storage,"products/"+Date.now());

uploadBytes(fileRef,file).then(res=>{
getDownloadURL(res.ref).then(url=>{
push(productsRef,{
name,
image:url
});
});
});
}

/* drag */
let dz = document.getElementById("dropZone");

dz.onclick=()=>document.getElementById("fileInput").click();

dz.addEventListener("dragover",e=>{
e.preventDefault();
dz.style.background="#ffe2c7";
});

dz.addEventListener("dragleave",()=>{
dz.style.background="#fff7ef";
});

dz.addEventListener("drop",e=>{
e.preventDefault();
handleFile(e.dataTransfer.files[0]);
});

document.getElementById("fileInput").addEventListener("change",e=>{
handleFile(e.target.files[0]);
});

/* حذف */
window.del = function(key){
remove(ref(db,"products/"+key));
}

/* عرض */
function render(data){
let div=document.getElementById("products");
div.innerHTML="";

Object.entries(data).forEach(([key,p])=>{
div.innerHTML+=`
<div class="card">
<img src="${p.image}">
<div class="card-body">

<h3>${p.name}</h3>

<button onclick="addCart()">
🛒 إضافة
</button>

${isAdmin ? `
<button class="del" onclick="del('${key}')">
🗑 حذف
</button>
` : ""}

</div>
</div>
`;
});
}

/* سلة */
window.addCart = function(){
cart.push(1);
document.getElementById("count").innerText=cart.length;
}

</script>

</body>
</html>
